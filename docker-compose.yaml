services:

  selenoid:
    container_name: selenoid
    image: aerokube/selenoid:1.11.3
    platform: linux/${ARCH}
    volumes:
      - ./env/docker/selenoid:/opt/selenoid
      - ./env/docker/selenoid/browsers.json:/opt/selenoid/browsers.json
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Europe/Moscow
    restart: unless-stopped
    command: [
      "-conf", "/opt/selenoid/browsers.json",
      "-limit", "3",
      "-video-output-dir", "/opt/selenoid/video",
      "-log-output-dir", "/opt/selenoid/logs",
      "-container-network", "automation_exercise_automation_exercise-network"
    ]
    ports:
      - "4444:4444"
    networks:
      - automation_exercise-network

  selenoid-ui:
    container_name: selenoid-ui
    image: aerokube/selenoid-ui:1.10.11
    depends_on:
      - selenoid
    restart: unless-stopped
    ports:
      - "5052:8080"
    command: [ "--selenoid-uri", "http://selenoid:4444" ]
    networks:
      - automation_exercise-network

  automation-exercise-tests:
    container_name: automation-exercise-tests
    image: ${PREFIX}/automation-exercise-tests:latest
    build:
      context: ./
      dockerfile: ./Dockerfile
    environment:
      - ENV=${ENV:-docker}
    volumes:
      - ./allure-results:/allure-results
      - ./resources/files:/app/resources/files
    depends_on:
      selenoid:
        condition: service_started
    networks:
      - automation_exercise-network

networks:
  automation_exercise-network:
    driver: bridge
