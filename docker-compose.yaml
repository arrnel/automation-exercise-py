services:

  selenoid:
    container_name: selenoid
    image: aerokube/selenoid:1.11.3
    volumes:
      - ./env/docker/selenoid:/etc/selenoid
      - /var/run/docker.sock:/var/run/docker.sock
      - ./env/docker/selenoid/browsers.json:/etc/selenoid/browsers.json
    environment:
      - TZ=Europe/Moscow
    restart: unless-stopped
    command: [ "-conf", "/etc/selenoid/browsers.json", "-limit", "3", "-video-output-dir", "/opt/selenoid/video", "-log-output-dir", "/opt/selenoid/logs", "-container-network", "automation_practice-automation_practice-network" ]
    ports:
      - "4444:4444"
    networks:
      - automation_practice-network

  selenoid-ui:
    profiles:
      - test
    container_name: selenoid-ui
    image: aerokube/selenoid-ui:1.10.11
    depends_on:
      - selenoid
    restart: unless-stopped
    ports:
      - "5052:8080"
    command: [ "--selenoid-uri", "http://selenoid:4444" ]
    networks:
      - automation_practice-network

networks:
  automation_practice-network:
    driver: bridge
