name: Screenshot test run

on:
  workflow_dispatch:
    inputs:
      REWRITE_ALL_SCREENSHOTS:
        description: Rewrite all screenshots
        type: boolean
        required: false
        default: false
        
      RUN_TESTS_WITH_DEBUG_MARKER:
        description: Run tests with debug marker
        type: boolean
        required: false
        default: false

concurrency:
  group: screenshot-resource
  cancel-in-progress: true

jobs:

  screenshot_run:

    runs-on: ubuntu-latest

    env:
      PREFIX: ${{ github.repository_owner }}
      ARCH: ${{ vars.ARCH }}
      # ---------- SECRETS
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      DEFAULT_EMAIL: ${{ secrets.DEFAULT_EMAIL }}
      DEFAULT_PASSWORD: ${{ secrets.DEFAULT_PASSWORD }}
      EMAIL_DOMAIN: ${{ secrets.EMAIL_DOMAIN }}
      # ---------- VARS
      ENV: ci
      PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
      PYTEST_ARGS: ${{ inputs.PYTEST_ARGS }}
      BASE_URL: ${{ vars.BASE_URL }}
      BASE_API_URL: ${{ vars.BASE_API_URL }}
      REMOTE_TYPE: ${{ vars.REMOTE_TYPE }}
      REMOTE_URL: ${{ vars.REMOTE_URL }}
      BROWSER_NAME: ${{ vars.BROWSER_NAME }}
      BROWSER_VERSION: ${{ vars.BROWSER_VERSION }}
      BROWSER_SIZE: ${{ vars.BROWSER_SIZE }}
      BROWSER_HEADLESS: ${{ vars.BROWSER_HEADLESS }}
      BROWSER_TIMEOUT: ${{ vars.BROWSER_TIMEOUT }}
      BROWSER_SCRIPTS_TIMEOUT: ${{ vars.BROWSER_SCRIPTS_TIMEOUT }}
      BROWSER_PAGE_LOAD_TIMEOUT: ${{ vars.BROWSER_PAGE_LOAD_TIMEOUT }}
      BROWSER_DOWNLOAD_DIR: ${{ vars.BROWSER_DOWNLOAD_DIR }}
      BROWSER_OVERRIDE_DOWNLOADED_FILE_DIR: ${{ vars.BROWSER_OVERRIDE_DOWNLOADED_FILE_DIR }}
      BROWSER_REMOTE_VNC: ${{ vars.BROWSER_REMOTE_VNC }}
      BROWSER_REMOTE_VIDEO: ${{ vars.BROWSER_REMOTE_VIDEO }}
      BROWSER_REMOTE_LOGS: ${{ vars.BROWSER_REMOTE_LOGS }}
      BROWSER_REMOTE_AUDIO: ${{ vars.BROWSER_REMOTE_AUDIO }}
      BROWSER_REMOTE_SESSION_TIMEOUT: ${{ vars.BROWSER_REMOTE_SESSION_TIMEOUT }}
      DEFAULT_USER_AGENT: ${{ vars.DEFAULT_USER_AGENT }}
      HTTP_TIMEOUT: ${{ vars.HTTP_TIMEOUT }}
      DEFAULT_PERCENT_OF_TOLERANCE: ${{ vars.DEFAULT_PERCENT_OF_TOLERANCE }}
      PATH_TO_FILES: ${{ vars.PATH_TO_FILES }}
      ALLURE_ATTACH_TEST_ARTIFACTS: ${{ vars.ALLURE_ATTACH_TEST_ARTIFACTS }}
      ALLURE_ATTACH_TEST_VIDEO: ${{ vars.ALLURE_ATTACH_TEST_VIDEO }}
      EXPECTED_PRODUCT_ID: ${{ vars.EXPECTED_PRODUCT_ID }}
      EXPECTED_PRODUCT_IDS: ${{ vars.EXPECTED_PRODUCT_IDS }}
      RECOMMENDED_PRODUCT_IDS: ${{ vars.RECOMMENDED_PRODUCT_IDS }}
      EXPECTED_CREDIT_CARD: ${{ vars.EXPECTED_CREDIT_CARD }}
      LOG_LVL: ${{ vars.LOG_LVL }}
      API_LOG_LVL: ${{ vars.API_LOG_LVL }}
      GITHUB_API_URL: ${{ github.GITHUB_API_URL }}
      GITHUB_TOKEN_NAME: ${{ vars.GH_TOKEN_NAME }}
      GITHUB_ACCOUNT_NAME: ${{ github.repository_owner }}
      GITHUB_REPO_NAME: ${{ vars.GH_REPO_NAME }}
      BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      # ---------- IMPORTANT VARS
      PYTEST_MARK_EXPR: screenshot_test
      REWRITE_ALL_SCREENSHOTS: ${{ inputs.REWRITE_ALL_SCREENSHOTS }}
      BROWSER_PAGE_LOAD_STRATEGY: normal

    steps:

      - name: Update PYTEST_MARK_EXPR
        if: ${{ inputs.RUN_TESTS_WITH_DEBUG_MARKER }}
        run: |
          echo "PYTEST_MARK_EXPR=screenshot_test and debug_test" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GITHUB_SHA }}

      - name: Get the last commit message
        run: |
          echo "HEAD_COMMIT_MESSAGE=$(git show -s --format=%s)" >> $GITHUB_ENV

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Pull Browser selenoid/vnc_${{ env.BROWSER_NAME }}:${{ env.BROWSER_VERSION }}
        run: |
          docker pull selenoid/vnc_${{ env.BROWSER_NAME }}:${{ env.BROWSER_VERSION }}
          docker pull selenoid/video-recorder:latest-release

      - name: Ensure workflow_resources branch exists
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin workflow_resources > /dev/null; then
            echo "Branch workflow_resources exists"
          else
            echo "Branch workflow_resources does not exist. Creating empty branch..."

            git checkout --orphan workflow_resources
            git rm -rf .

            git commit --allow-empty -m "chore: initialize workflow_resources branch"
            git push origin workflow_resources

            git checkout -
          
          fi

      - name: Checkout workflow_resources branch
        uses: actions/checkout@v4
        with:
          ref: workflow_resources
          path: workflow_resources

      - name: Prepare workflow_resources directory
        run: |
          set -e
          mkdir -p workflow_resources/screenshot

      - name: Run tests
        id: test_run
        if: always()
        run: |
          set -euo pipefail
          
          SHOW_LOGS="${{ vars.SHOW_TEST_CONTAINER_LOGS }}"

          if [ "${{ inputs.RUN_TESTS_WITH_DEBUG_MARKER }}" = "true" ]; then
            echo "PYTEST_MARK_EXPR=screenshot_test and debug_test" >> $GITHUB_ENV
          fi
          
          docker compose -f docker-compose.ci.yaml up -d
          docker ps -a
          docker wait automation-exercise-tests
          
          if [ "$SHOW_LOGS" = "true" ]; then
            echo "### Test logs ###"
            docker logs automation-exercise-tests
          fi
        continue-on-error: true

      - name: Get Allure history
        uses: actions/checkout@v2
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report action from marketplace
        uses: simple-elf/allure-report-action@master
        if: always()
        #id: allure-report
        with:
          allure_results: allure-results
          #gh_pages: gh-pages
          #allure_report: allure-report
          allure_history: allure-history

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v2
        env:
          PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: allure-history

      - name: Commit workflow_resources changes
        if: always()
        run: |
          set -e
          cd workflow_resources

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit in workflow_resources"
            exit 0
          fi

          git commit -m "chore: update workflow resources (screenshots)"
          git push origin workflow_resources
