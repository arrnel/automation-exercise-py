services:

  selenoid:
    profiles:
      - test
    container_name: selenoid
    image: aerokube/selenoid:1.11.3
    platform: linux/${ARCH}
    volumes:
      - ./env/docker/selenoid:/etc/selenoid
      - /var/run/docker.sock:/var/run/docker.sock
      - ./env/docker/selenoid/browsers.json:/etc/selenoid/browsers.json
    environment:
      - TZ=Europe/Moscow
    restart: unless-stopped
    command: [ "-conf", "/etc/selenoid/browsers.json", "-limit", "3", "-video-output-dir", "/opt/selenoid/video", "-log-output-dir", "/opt/selenoid/logs", "-container-network", "automation_practice_automation_practice-network" ]
    ports:
      - "4444:4444"
    networks:
      - rococo-network


networks:
  automation_practice:
    driver: bridge