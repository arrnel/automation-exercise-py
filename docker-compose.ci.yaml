services:

  selenoid:
    container_name: selenoid
    image: aerokube/selenoid:1.11.3
    platform: linux/${ARCH}
    volumes:
      - ./env/docker/selenoid:/etc/selenoid
      - /var/run/docker.sock:/var/run/docker.sock
      - ./env/docker/selenoid/browsers.json:/etc/selenoid/browsers.json
    environment:
      - TZ=Europe/Moscow
      - ENV=ci
    restart: unless-stopped
    command: [ "-conf", "/etc/selenoid/browsers.json", "-limit", "3", "-video-output-dir", "/opt/selenoid/video", "-log-output-dir", "/opt/selenoid/logs", "-container-network", "automation_exercise_automation_exercise-network" ]
    ports:
      - "4444:4444"
    networks:
      - automation_exercise-network

  automation-exercise-tests:
    container_name: automation-exercise-tests
    image: ${PREFIX}/automation-exercise-tests:latest
    build:
      context: ./
      dockerfile: ./Dockerfile
    environment:
      - ENV=${ENV:-ci}
      - BUILD_URL=${BUILD_URL}
      - HEAD_COMMIT_MESSAGE=${HEAD_COMMIT_MESSAGE}
    volumes:
      - ./resources/files:/app/resources/files
      - ./allure-results:/allure-results
    depends_on:
      selenoid:
        condition: service_started
    networks:
      - automation_exercise-network

networks:
  automation_exercise-network:
    driver: bridge
